<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- mud app icon: a shovel stuck in a mound of dirt -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a10"/>
      <stop offset="1" stop-color="#140e07"/>
    </linearGradient>
    <linearGradient id="dirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7d5430"/>
      <stop offset="1" stop-color="#5a3a20"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dfe6ee"/>
      <stop offset="1" stop-color="#9aa6b3"/>
    </linearGradient>
  </defs>

  <!-- background tile -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#tile)"/>

  <!-- shovel (leaning into the dirt) -->
  <g transform="rotate(20 32 38)">
    <!-- wooden shaft -->
    <rect x="29.6" y="6" width="4.8" height="33" rx="2.4" fill="#cda063"/>
    <rect x="29.6" y="6" width="2" height="33" rx="1" fill="#e0bd86"/>
    <!-- T-handle grip -->
    <rect x="23" y="3.5" width="18" height="5" rx="2.5" fill="#cda063"/>
    <rect x="23" y="3.5" width="18" height="2" rx="1" fill="#e0bd86"/>
    <!-- collar where blade meets shaft -->
    <rect x="27.8" y="36.5" width="8.4" height="4.6" rx="1.4" fill="#7e858f"/>
    <!-- steel spade blade -->
    <path d="M24.5 40 L39.5 40 L39.5 50 Q32 60 24.5 50 Z" fill="url(#steel)" stroke="#6f7a86" stroke-width="0.6"/>
    <!-- center rib -->
    <path d="M32 41 L32 55" stroke="#7e8a97" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- mound of dirt, drawn over the blade so it looks buried -->
  <path d="M1 51 C12 43 21 47 32 47 C43 47 52 43 63 51 L63 64 L1 64 Z" fill="url(#dirt)"/>
  <path d="M1 51 C12 43 21 47 32 47 C43 47 52 43 63 51" fill="none" stroke="#8f6238" stroke-width="1.4" opacity="0.8"/>
  <!-- dirt clods / texture -->
  <circle cx="14" cy="56" r="2.1" fill="#4d3119"/>
  <circle cx="48" cy="57" r="2.4" fill="#4d3119"/>
  <circle cx="24" cy="59" r="1.5" fill="#8a623a"/>
  <circle cx="40" cy="60" r="1.8" fill="#8a623a"/>
  <circle cx="55" cy="60" r="1.3" fill="#4d3119"/>
</svg>
